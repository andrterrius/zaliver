name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  QT_QPA_PLATFORM: offscreen

jobs:
  package:
    name: Wheel and sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  pyinstaller-onefile:
    name: PyInstaller onefile (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows x64
            artifact: zaliver-windows-x86_64
            upload_path: dist/zaliver.exe
          - os: macos-latest
            name: macOS ARM64
            artifact: zaliver-macos-arm64
            upload_path: dist/zaliver

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[bundle]"

      - name: Smoke import (headless Qt)
        run: python -c "from zaliver.ui.main_window import MainWindow; print('import ok')"

      - name: PyInstaller (onefile)
        run: python -m PyInstaller --noconfirm zaliver_onefile.spec

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.upload_path }}
          if-no-files-found: error
