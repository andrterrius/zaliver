name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  QT_QPA_PLATFORM: offscreen

jobs:
  package:
    name: Wheel and sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  pyinstaller-onefile-windows:
    name: PyInstaller onefile (Windows x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[bundle]"

      - name: Smoke import (headless Qt)
        run: python -c "from zaliver.ui.main_window import MainWindow; print('import ok')"

      - name: PyInstaller (onefile, Windows spec)
        run: python -m PyInstaller --noconfirm zaliver_onefile_windows.spec

      - uses: actions/upload-artifact@v4
        with:
          name: zaliver-windows-x86_64
          path: dist/Zaliver.exe
          if-no-files-found: error

  pyinstaller-onefile-macos:
    name: PyInstaller onefile (macOS ARM64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[bundle]"

      - name: Smoke import (headless Qt)
        run: python -c "from zaliver.ui.main_window import MainWindow; print('import ok')"

      - name: PyInstaller (onefile, macOS spec)
        run: python -m PyInstaller --noconfirm zaliver_onefile_macos.spec

      - uses: actions/upload-artifact@v4
        with:
          name: zaliver-macos-arm64
          path: dist/Zaliver.app
          if-no-files-found: error
